<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links Arcade | 2D Mini-Golf Game</title>
    <style>
        :root {
            --slate-blue: #0f2c59;
            --corporate-blue: #1d4ed8;
            --fairway-green: #16a34a;
            --white: #ffffff;
            --charcoal: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #f1f5f9; 
            color: var(--charcoal); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .game-wrapper {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 820px;
            width: 100%;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        h1 { font-size: 1.5rem; color: var(--slate-blue); font-weight: 800; }
        h1 span { color: var(--fairway-green); }

        .stats-display {
            display: flex;
            gap: 1.5rem;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .stat-val { color: var(--corporate-blue); }

        canvas {
            background-color: #22c55e;
            border: 4px solid var(--slate-blue);
            border-radius: 8px;
            cursor: crosshair;
            display: block;
            margin: 0 auto;
            max-width: 100%;
        }

        .controls-tip {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #64748b;
            line-height: 1.4;
        }

        .btn-reset {
            margin-top: 1rem;
            padding: 0.6rem 1.2rem;
            background-color: var(--slate-blue);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-reset:hover { background-color: var(--corporate-blue); }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="game-header">
        <h1>⛳ Links<span>Arcade</span></h1>
        <div class="stats-display">
            <div>Hole: <span id="ui-hole" class="stat-val">1</span> / 3</div>
            <div>Strokes: <span id="ui-strokes" class="stat-val">0</span></div>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <button class="btn-reset" onclick="resetEntireGame()">Restart Course</button>
    <div class="controls-tip">
        <strong>How to Play:</strong> Click and drag backward from the white golf ball to aim your shot. The length of the line dictates power. Release the click to putt! Watch out for sand traps and water hazards.
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game Core State Variables
    let currentLevel = 1;
    let totalStrokes = 0;
    
    // Physics Parameters
    const ball = { x: 100, y: 250, vx: 0, vy: 0, radius: 8, friction: 0.985 };
    const hole = { x: 700, y: 250, radius: 14 };
    
    let isDragging = false;
    let mouseStart = { x: 0, y: 0 };
    let mouseCurrent = { x: 0, y: 0 };

    // Hazard Object Maps
    let obstacles = [];
    let sandTraps = [];
    let waterHazards = [];

    function initLevel(level) {
        ball.vx = 0;
        ball.vy = 0;
        isDragging = false;
        
        document.getElementById('ui-hole').textContent = level;

        if (level === 1) {
            ball.x = 100; ball.y = 250;
            hole.x = 700; hole.y = 250;
            obstacles = []; sandTraps = []; waterHazards = [];
        } else if (level === 2) {
            ball.x = 100; ball.y = 150;
            hole.x = 700; hole.y = 350;
            // Vertical structural walls
            obstacles = [
                { x: 400, y: 0, w: 40, h: 320 }
            ];
            sandTraps = [
                { x: 200, y: 100, w: 120, h: 120 }
            ];
            waterHazards = [];
        } else if (level === 3) {
            ball.x = 100; ball.y = 250;
            hole.x = 700; hole.y = 250;
            obstacles = [];
            sandTraps = [
                { x: 500, y: 150, w: 100, h: 200 }
            ];
            waterHazards = [
                { x: 320, y: 120, w: 80, h: 260 }
            ];
        }
    }

    // Input Mechanics
    canvas.addEventListener('mousedown', (e) => {
        if (Math.abs(ball.vx) < 0.1 && Math.abs(ball.vy) < 0.1) {
            const rect = canvas.getBoundingClientRect();
            const mX = e.clientX - rect.left;
            const mY = e.clientY - rect.top;
            
            // Allow click anywhere near the ball
            if (Math.hypot(mX - ball.x, mY - ball.y) < 30) {
                isDragging = true;
                mouseStart = { x: ball.x, y: ball.y };
                mouseCurrent = { x: mX, y: mY };
            }
        }
    });

    canvas.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const rect = canvas.getBoundingClientRect();
        mouseCurrent.x = e.clientX - rect.left;
        mouseCurrent.y = e.clientY - rect.top;
    });

    canvas.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        
        // Calculate shot vectors based on drag distance
        const dx = ball.x - mouseCurrent.x;
        const dy = ball.y - mouseCurrent.y;
        
        // Applying scalar factor to control speed metrics
        ball.vx = dx * 0.12;
        ball.vy = dy * 0.12;
        
        totalStrokes++;
        document.getElementById('ui-strokes').textContent = totalStrokes;
    });

    function updatePhysics() {
        // Apply position progression step
        ball.x += ball.vx;
        ball.y += ball.vy;

        // Apply friction drag baseline
        let currentFriction = ball.friction;

        // Sand Trap Interaction Check
        sandTraps.forEach(trap => {
            if (ball.x > trap.x && ball.x < trap.x + trap.w && ball.y > trap.y && ball.y < trap.y + trap.h) {
                currentFriction = 0.82; // Significant dampening deceleration
            }
        });

        // Water Hazard Interaction Check
        waterHazards.forEach(water => {
            if (ball.x > water.x && ball.x < water.x + water.w && ball.y > water.y && ball.y < water.y + water.h) {
                // Reset ball position on penalty
                ball.vx = 0; ball.vy = 0;
                totalStrokes++;
                document.getElementById('ui-strokes').textContent = totalStrokes;
                initLevel(currentLevel);
                alert("Water Hazard! +1 Penalty Stroke applied.");
            }
        });

        ball.vx *= currentFriction;
        ball.vy *= currentFriction;

        // Outer Frame Bound Collisions
        if (ball.x - ball.radius < 0) { ball.x = ball.radius; ball.vx *= -1; }
        if (ball.x + ball.radius > canvas.width) { ball.x = canvas.width - ball.radius; ball.vx *= -1; }
        if (ball.y - ball.radius < 0) { ball.y = ball.radius; ball.vy *= -1; }
        if (ball.y + ball.radius > canvas.height) { ball.y = canvas.height - ball.radius; ball.vy *= -1; }

        // Rigid Obstacle Collision Check
        obstacles.forEach(obs => {
            if (ball.x + ball.radius > obs.x && ball.x - ball.radius < obs.x + obs.w &&
                ball.y + ball.radius > obs.y && ball.y - ball.radius < obs.y + obs.h) {
                
                // Determine collision face orientation
                const distLeft = Math.abs((ball.x + ball.radius) - obs.x);
                const distRight = Math.abs((ball.x - ball.radius) - (obs.x + obs.w));
                const distTop = Math.abs((ball.y + ball.radius) - obs.y);
                const distBottom = Math.abs((ball.y - ball.radius) - (obs.y + obs.h));

                const minDist = Math.min(distLeft, distRight, distTop, distBottom);

                if (minDist === distLeft) { ball.x = obs.x - ball.radius; ball.vx *= -1; }
                else if (minDist === distRight) { ball.x = obs.x + obs.w + ball.radius; ball.vx *= -1; }
                else if (minDist === distTop) { ball.y = obs.y - ball.radius; ball.vy *= -1; }
                else if (minDist === distBottom) { ball.y = obs.y + obs.h + ball.radius; ball.vy *= -1; }
            }
        });

        // Check if Ball Entered Hole
        const distToHole = Math.hypot(ball.x - hole.x, ball.y - hole.y);
        if (distToHole < hole.radius) {
            // Speed must be low enough to fall into the cup
            if (Math.hypot(ball.vx, ball.vy) < 3.5) {
                ball.vx = 0; ball.vy = 0;
                if (currentLevel < 3) {
                    alert(`Hole ${currentLevel} Complete! Nice Putt.`);
                    currentLevel++;
                    initLevel(currentLevel);
                } else {
                    alert(`Congratulations! You finished the course in ${totalStrokes} total strokes.`);
                    resetEntireGame();
                }
            }
        }
    }

    function draw() {
        // Render Fairway
        ctx.fillStyle = '#22c55e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Sand Traps
        ctx.fillStyle = '#fef08a';
        sandTraps.forEach(trap => ctx.fillRect(trap.x, trap.y, trap.w, trap.h));

        // Draw Water Hazards
        ctx.fillStyle = '#38bdf8';
        waterHazards.forEach(water => ctx.fillRect(water.x, water.y, water.w, water.h));

        // Draw Structural Obstacles
        ctx.fillStyle = '#475569';
        obstacles.forEach(obs => ctx.fillRect(obs.x, obs.y, obs.w, obs.h));

        // Draw Target Cup Hole
        ctx.beginPath();
        ctx.arc(hole.x, hole.y, hole.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#0f172a';
        ctx.fill();
        ctx.closePath();

        // Draw Aiming Guide Vector Line
        if (isDragging) {
            ctx.beginPath();
            ctx.moveTo(ball.x, ball.y);
            // Dynamic opposite aiming pull vector computation
            const targetX = ball.x + (ball.x - mouseCurrent.x);
            const targetY = ball.y + (ball.y - mouseCurrent.y);
            ctx.lineTo(targetX, targetY);
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 3;
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.closePath();
        }

        // Draw Golf Ball
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.closePath();
    }

    function gameLoop() {
        updatePhysics();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function resetEntireGame() {
        currentLevel = 1;
        totalStrokes = 0;
        document.getElementById('ui-strokes').textContent = totalStrokes;
        initLevel(currentLevel);
    }

    // Start App Routine
    initLevel(currentLevel);
    gameLoop();
</script>
</body>
</html>
